<!DOCTYPE html>
<html lang="tr">
<head>

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="FiveMods">
  <meta property="og:title" content="Radio Modlari | FiveMods">
  <meta property="og:description" content="FiveM radio modlari ve Radio V1.0 - V1.6 surumlerini tek kategoride inceleyip ZIP olarak indir.">
  <meta property="og:url" content="https://umutcsar47.github.io/fivemods-site/kategori-radio.html">
  <meta property="og:image" content="https://umutcsar47.github.io/fivemods-site/assets/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Radio Modlari | FiveMods">
  <meta name="twitter:description" content="FiveM radio modlari ve Radio V1.0 - V1.6 surumlerini tek kategoride inceleyip ZIP olarak indir.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="assets/logo.png">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <style>
    :root {
      --bg: #0a0a0d;
      --card: #14141a;
      --ink: #f5f6f8;
      --muted: #9ca3af;
      --accent: #ff7a00;
      --accent-2: #ffb347;
      --line: rgba(255, 122, 0, 0.2);
      --shadow: 0 22px 50px rgba(5, 6, 10, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(760px 420px at 12% -10%, rgba(255, 122, 0, 0.32) 0%, transparent 62%),
        radial-gradient(720px 360px at 88% 6%, rgba(255, 179, 71, 0.22) 0%, transparent 60%),
        linear-gradient(180deg, #0a0a0d 0%, #070709 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
      opacity: 0.35;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(10, 13, 18, 0.85);
      border-bottom: 1px solid var(--line);
    }

    .container {
      width: min(1120px, 92vw);
      margin: 0 auto;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      gap: 16px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: rgba(255, 122, 0, 0.1);
      border: 1px solid rgba(255, 122, 0, 0.4);
      box-shadow: 0 14px 36px rgba(255, 122, 0, 0.28);
    }

    .logo-img {
      width: 56px;
      height: auto;
      filter:
        drop-shadow(0 0 22px rgba(255, 122, 0, 0.98))
        drop-shadow(0 18px 34px rgba(0, 0, 0, 0.5))
        brightness(1.08)
        saturate(1.15);
    }

    .logo-text {
      font-family: "Chakra Petch", "Plus Jakarta Sans", system-ui, sans-serif;
      font-size: 24px;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, #ffffff 0%, #ffb347 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      color: var(--muted);
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      transition: color 0.2s ease, background 0.2s ease;
    }

    .nav a:hover {
      color: var(--ink);
      background: rgba(255, 122, 0, 0.12);
    }

    .nav .cta {
      color: #1b0b00;
      background: linear-gradient(120deg, var(--accent), #ffb347);
      font-weight: 600;
    }

    main {
      position: relative;
      z-index: 1;
      padding: 56px 0 80px;
    }

    .section {
      padding: 60px 0;
    }

    .section h2 {
      font-size: 28px;
      margin: 0 0 8px;
      font-family: "Chakra Petch", "Plus Jakarta Sans", system-ui, sans-serif;
    }

    .section p {
      color: var(--muted);
      margin: 0 0 22px;
      max-width: 640px;
      line-height: 1.6;
    }

    .category-card {
      background: var(--card);
      border-radius: 18px;
      border: 1px solid rgba(255, 122, 0, 0.12);
      box-shadow: var(--shadow);
      padding: 24px;
      display: grid;
      gap: 14px;
      max-width: 720px;
    }

    .category-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255, 122, 0, 0.18);
      color: var(--accent-2);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 700;
      background: linear-gradient(120deg, var(--accent), #ffb347);
      color: #1b0b00;
      box-shadow: var(--shadow);
      width: fit-content;
    }

    footer {
      text-align: center;
      padding: 30px 0 50px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 700px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html" aria-label="FiveMods">
          <span class="logo-mark">
            <img class="logo-img" src="assets/logo.png" alt="FiveMods logo" onerror="this.style.display='none'">
          </span>
          <span class="logo-text">FiveMods</span>
        </a>
        <nav class="nav">
          <a href="index.html">Ana Sayfa</a>
          <a href="mods.html">Modlar</a>
          <a href="kategoriler.html">Kategoriler</a>
          <a href="hakkinda.html">Hakkında</a>
          <a class="cta" href="mods.html">Mod İndir</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <span class="pill">Kategori</span>
        <h2>Radio</h2>
        <p>Radio kategorisindeki tüm sürümler ayrı ayrı mod sayfasında listelenir. Aşağıdan modlara geçebilirsin.</p>
        <div class="category-card">
          <div class="category-meta">
            <span>Toplam sürüm: 7</span>
            <span>Güncel sürüm: V1.6</span>
          </div>
          <a class="btn" href="mods.html">Radio Modlarını Gör</a>
        </div>
      </section>
    </main>

    <footer>
      © 2026 FiveMods - Modern mod koleksiyonu ve hızlı destek
    </footer>
  </div>
</body>
</html>
